{% extends 'main/base.html' %}
{% block content %}

<section class="contact" style="padding: 60px 40px;">
    <h2>Login</h2>

    <form method="POST" style="max-width: 350px; margin: 20px auto;">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required
               style="width:100%; padding:12px; border-radius:8px; margin-bottom:12px; border:1px solid #ccc;">
        <input type="password" name="password" placeholder="Password" required
               style="width:100%; padding:12px; border-radius:8px; margin-bottom:12px; border:1px solid #ccc;">
        
        <button class="cta-btn" style="width: 100%;">Login</button>
    </form>

    <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</section>

{% endblock %}
