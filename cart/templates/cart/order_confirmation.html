{% extends 'main/base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <div class="alert alert-success" role="alert">
        <i class="fas fa-check-circle fa-4x mb-3"></i>
        <h4 class="alert-heading">Order Placed!</h4>
        <p>Thank you for your order. Your meal is being prepared and will be delivered soon.</p>
        <hr>
        <p class="mb-0">A confirmation email has been sent to your address.</p>
    </div>
    <a href="{% url 'home' %}" class="btn btn-warning mt-3">Continue Shopping</a>
</div>
{% endblock %}
