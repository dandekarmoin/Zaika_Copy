{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZaikaX Admin Panel</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'admin/css/admin.css' %}">
</head>

<body>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm fixed-top animate__animated animate__fadeInDown">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'admin_dashboard' %}">ZaikaX Admin</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">
                        <i class="fa-solid fa-user"></i> Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger" href="{% url 'admin_logout' %}">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>


<!-- SIDEBAR + CONTENT -->
<div class="d-flex" style="margin-top:70px;">

    <!-- SIDEBAR -->
    <div class="sidebar bg-dark text-white p-3">
        <h4 class="text-center mb-4">Menu</h4>

        <a href="{% url 'admin_dashboard' %}" class="sidebar-link">
            <i class="fa-solid fa-gauge"></i> Dashboard
        </a>

        <!-- FIXED URL -->
        <a href="{% url 'admin_menu' %}" class="sidebar-link">
            <i class="fa-solid fa-burger"></i> Manage Menu
        </a>

        <a href="{% url 'admin_orders' %}" class="sidebar-link">
            <i class="fa-solid fa-cart-shopping"></i> Orders
        </a>

        <a href="{% url 'admin_users' %}" class="sidebar-link">
            <i class="fa-solid fa-users"></i> Users
        </a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content p-4 flex-grow-1">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'admin/js/admin.js' %}"></script>

</body>
</html>
